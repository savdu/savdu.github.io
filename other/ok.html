<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>r u ok?</title>
    <style>
        body { font-family: 'Monaco', monospace; font-size: small;}
        button { font-family: 'Monaco', monospace; font-size: small; cursor: pointer;}

        .item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 0;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 0;
        }

        input:checked + .slider {
            background-color: green;
        }

        input:checked + .slider:before {
            transform: translateX(14px);
        }
    </style>
</head>
<body>

    <a href="/index.html">back</a><br>

    <p>r u ok?</p>

    <div class="item">
        <label class="switch"><input type="checkbox" id="q1"><span class="slider"></span></label>
        <span>have you eaten?</span>
    </div>
    <div class="item">
        <label class="switch"><input type="checkbox" id="q2"><span class="slider"></span></label>
        <span>have you drank water?</span>
    </div>
    <div class="item">
        <label class="switch"><input type="checkbox" id="q3"><span class="slider"></span></label>
        <span>have you slept?</span>
    </div>
    <div class="item">
        <label class="switch"><input type="checkbox" id="q4"><span class="slider"></span></label>
        <span>have you seen the sun?</span>
    </div>
    <div class="item">
        <label class="switch"><input type="checkbox" id="q5"><span class="slider"></span></label>
        <span>have you had screen off time?</span>
    </div>
    <div class="item">
        <label class="switch"><input type="checkbox" id="q6"><span class="slider"></span></label>
        <span>have you left the house?</span>
    </div>
    <br>

    <button onclick="handleSubmit()">beep boop calcumalate</button>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script>
        function handleSubmit() {
            const count = document.querySelectorAll('input[type="checkbox"]:checked').length;
            const messages = {
                0: "you are not ok. seek help.",
                1: "you are not ok. seek help.",
                2: "how about doing more than the bare minimum?",
                3: "how about doing more than the bare minimum?",
                4: "you are almost ok.",
                5: "you are almost ok.",
                6: "congratulations. you are ok."
            };
            if (count === 6) {
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
            }
            alert(messages[count]);
        }
    </script>

</body>
</html>
